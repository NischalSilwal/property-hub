services:
  mysql:
    image: mysql:8.0
    container_name: property_hub_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: property_hub_db
      MYSQL_USER: propertyhub_user
      MYSQL_PASSWORD: propertyhub@12345
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
